<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridStrike | Tactical War Strategy for Apple Watch</title>
    <style>
        :root {
            --apple-red: #ff3b30;
            --apple-blue: #007aff;
            --bg-dark: #0a0a0a;
            --container-bg: #161617;
            --text-main: #eeeeee;
            --text-dim: #86868b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 80px 20px 60px 20px;
            text-align: center;
            max-width: 800px;
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 24%;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0;
            letter-spacing: -1px;
            font-weight: 800;
        }

        .tagline {
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-bottom: 0;
        }

        .container {
            max-width: 900px;
            width: 90%;
            background-color: var(--container-bg);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            text-align: left;
        }

        .feature-box h3 {
            color: var(--apple-red);
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        /* SCREENSHOT SCROLL FIX */
        .screenshots-scroll {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 0;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: #333 #1a1a1a;
            -webkit-overflow-scrolling: touch;
        }

        .screenshots-scroll::-webkit-scrollbar {
            height: 8px;
            display: block;
        }

        .screenshots-scroll::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }

        .screenshots-scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
